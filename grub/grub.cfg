# Sample GRUB config for Mama Bear OS (MBOS)

set timeout=5
set default=0

# Enable serial console for headless runs (QEMU -nographic / -serial stdio)
serial --unit=0 --speed=115200
terminal_input serial
terminal_output serial

# Set GRUB background image (PNG must be 8-bit/color, place in /boot/grub/)
if loadfont /boot/grub/fonts/unicode.pf2; then
  set gfxmode=800x600x32
  insmod vbe
  insmod gfxterm
  terminal_output gfxterm
  insmod png
  if test -e /boot/grub/mbos.png; then
    background_image /boot/grub/mbos.png
  fi
fi

# Set colors: foreground/background, highlight fg/bg
set color_normal=light-cyan/black
set color_highlight=yellow/blue

# MBOS Branding
menuentry "★ Mama Bear OS (MBOS)" {
    set gfxmode=1024x768x32
    set gfxpayload=keep
    multiboot /boot/kernel.bin
    boot
}

# Recovery/Advanced entry
menuentry "★ MBOS (Recovery Mode)" {
    multiboot /boot/kernel.bin
    boot
}

# Example: chainload another OS
menuentry "Reboot" {
    reboot
}
menuentry "Poweroff" {
    halt
}

